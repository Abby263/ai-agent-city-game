services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentcity-postgres
    environment:
      POSTGRES_USER: agentcity
      POSTGRES_PASSWORD: agentcity
      POSTGRES_DB: agentcity
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentcity -d agentcity"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agentcity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
